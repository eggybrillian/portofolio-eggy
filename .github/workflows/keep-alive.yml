name: Keep Supabase Alive

on:
  schedule:
    # Berjalan setiap hari pada jam 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Memungkinkan Anda menjalankan manual jika mau

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Request to Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/nama_tabel_anda?select=*" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
